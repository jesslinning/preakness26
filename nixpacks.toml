# Node (npm build) + Python (FastAPI runtime). Without [start], Nixpacks runs `npm start`
# in an environment where `python` may be missing from PATH (only python3, or Node-only shell).

[variables]
NIXPACKS_NODE_VERSION = "20"
NIXPACKS_PYTHON_VERSION = "3.12"

# Prefer uvicorn directly so the container process is Python, not `npm start`.
[start]
cmd = "sh -c 'PYTHONPATH=. exec python3 -m uvicorn app.odds_api:app --host 0.0.0.0 --port ${PORT:-8000}'"

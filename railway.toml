# LIVE ODDS: deploy from repo root. Prefer Dockerfile (Python runtime + Vite dist).
#
# Railway UI → Service → Settings → Root Directory MUST be empty (repo root).
# If Settings → Config-as-code points at app/web/railway.toml, that shim must stay
# in sync with this file (or clear the path to use this file only).
#
# Optional static-only frontend (separate service): see railway.static.example.toml.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
